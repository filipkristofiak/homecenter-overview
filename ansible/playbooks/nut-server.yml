---
- name: Configure NUT server on nut-01 LXC (pve-01)
  hosts: nut-01
  become: false # LXC root user - vlan + hv hardening

  roles:
    - common
    - nut
    - node_exporter
    - nut_exporter

- name: Deploy APC UPS udev rule on pve-01 host
  hosts: pve-01
  become: true

  tasks:
    - name: Deploy udev rule for APC UPS USB device
      copy:
        dest: /etc/udev/rules.d/99-apc-ups.rules
        content: |
          SUBSYSTEM=="usb", ATTR{idVendor}=="051d", MODE="0666", GROUP="nut"
        owner: root
        group: root
        mode: "0644"
      notify: Reload udev rules

  handlers:
    - name: Reload udev rules
      shell: udevadm control --reload-rules && udevadm trigger
