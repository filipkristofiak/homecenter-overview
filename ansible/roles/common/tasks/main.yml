---
- name: Set colored PS1 prompt (blue background, bright white text)
  lineinfile:
    path: /root/.bashrc
    regexp: '^export PS1='
    line: "export PS1='\\[\\e[48;2;3;36;200m\\e[97m\\]\\u@\\h\\[\\e[0m\\]:\\w\\$ '"
    state: present
    create: true

- name: Disable SSH reverse DNS lookup (eliminates ~20s login delay)
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?UseDNS'
    line: 'UseDNS no'
    state: present
  notify: Restart sshd

- name: Install base prerequisites
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Add Docker GPG key (dearmored)
  shell: >
    curl -fsSL https://download.docker.com/linux/debian/gpg
    | gpg --dearmor --yes -o /usr/share/keyrings/docker-archive-keyring.gpg
  args:
    creates: /usr/share/keyrings/docker-archive-keyring.gpg

- name: Add Docker apt repository
  copy:
    dest: /etc/apt/sources.list.d/docker.list
    content: "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/debian bookworm stable\n"
    mode: "0644"
  notify: Update apt cache

- name: Flush handlers (refresh apt cache after Docker repo added)
  meta: flush_handlers

- name: Install Docker Engine and Compose plugin
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present

- name: Enable and start Docker
  systemd:
    name: docker
    enabled: true
    state: started
